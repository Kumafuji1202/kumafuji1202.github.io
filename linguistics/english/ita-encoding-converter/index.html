<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../../css-global/global.css" />
  <title>ITA encoding converter</title>
  <script src="../../../js-global/utils.js"></script>
  <script src="../../../js-global/utf16-string.js"></script>
  <script src="data.js"></script>
  <script>
   // 内部的に使用する非文字:
   // u+fdd0: half a 用
   // u+fdd1: 大文字セクション開始
   // u+fdd2: 大文字セクション終了
   function convert(text, origid, destid = 0, startcaps = "", endcaps = "") {
    if (origid == destid) return text;
    let detectCaps = (!systems[origid].supportsCaps && systems[destid].supportsCaps && startcaps != "" && endcaps != "");
    let encloseCaps = systems[origid].supportsCaps && !systems[destid].supportsCaps;
    let capStartMarkAndEndMarkAreIdentical = startcaps == endcaps;
    if (detectCaps) {
     // 大文字を検知して大文字に変換
     if (startcaps.length < endcaps.length) {
      text = text.replaceAll(endcaps, "\ufdd2");
      text = text.replaceAll(startcaps, "\ufdd1");
     } else {
      text = text.replaceAll(startcaps, "\ufdd1");
      text = text.replaceAll(endcaps, "\ufdd2");
     }
    }
    let output = "";
    let origtext = text;
    let lastCharWasCap = false;
    let useCapsIfPossible = false;
    for (let rawchar of origtext.toArray()) {
     let char = rawchar;

     // 大文字と小文字の返還を確認
     if (detectCaps) {
      if (char == "\ufdd1") {
       if (startcaps == endcaps) useCapsIfPossible = !useCapsIfPossible;
       else useCapsIfPossible = true;
       continue;
      }
      if (char == "\ufdd2") {
       useCapsIfPossible = false;
       continue;
      }
     }
     // 小文字に変換
     if (encloseCaps) {
      char = char.toLowerCase();
      let thisCharIsCap = char != rawchar;
      if (thisCharIsCap && !lastCharWasCap) output += startcaps;
      if (!thisCharIsCap && lastCharWasCap) output += endcaps;
      lastCharWasCap = thisCharIsCap;
     }

     if (systems[origid].letters.includes(char)) {
      let corr = systems[destid].letters[systems[origid].letters.indexOf(char)];
      console.log(corr);
      if (detectCaps && useCapsIfPossible) output += corr.toUpperCase();
      else output += corr;
     } else {
      if (detectCaps && useCapsIfPossible) output += char.toUpperCase();
      else output += char;
     }
    }
    // 大文字で終わった場合
    if (lastCharWasCap) output += endcaps;
    return output;
   }
   onPageLoad(() => {
    function updateOutput() {
     let destid = getElem("destsystem").value;
     getElem("output").setAttribute("class", destid + "-ita");
     let origid = getElem("originsystem").value;
     let output = convert(getElem("input").value, origid, destid, getElem("startcaps").value, getElem("endcaps").value);
     if (getElem("bath").value == "trap") output = output.replaceAll("\ufdd0", "a");
     else output = output.replaceAll("\ufdd0", "q");
     // HTMLに出力
     getElem("output").innerHTML = output.cleanse();
    }
    function updateInputFont() {
     getElem("input").setAttribute("class", getElem("originsystem").value + "-ita");
     getElem("input").setAttribute("placeholder", convert("inpõt sum ITA tekst...", "pit", getElem("originsystem").value));
     updateOutput();
    }

    for (let sysid in systems) {
     let sys = systems[sysid];
     pack("option", sys.name).setAttributes({ value: sysid }).addTo(getElem("originsystem"));
     pack("option", sys.name).setAttributes({ value: sysid }).addTo(getElem("destsystem"));
    }
    getElem("originsystem").addEventListener("change", updateInputFont);
    getElem("destsystem").addEventListener("change", updateOutput);
    getElem("startcaps").addEventListener("change", updateOutput);
    getElem("endcaps").addEventListener("change", updateOutput);
    getElem("bath").addEventListener("change", updateOutput);
    updateInputFont();
    updateOutput();
    getElem("input").addEventListener("input", updateOutput);
   });
  </script>
  <style>
   .uni-ita {
    font-family: inherit;
    font-feature-settings: "ss02";
   }
   .pit-ita {
    font-family: "PitmanITA";
   }
   .nish-ita {
    font-family: "Nishiki-teki";
   }
   .cat-ita {
    font-family: "Catrinity";
   }
   .xim-ita {
    font-family: "Xim Sans Handwritten";
   }
   .fnmk-ita {
    font-family: "Phonemics";
   }
   #startcaps {
    text-align-last: end;
   }
   input[type="text"] {
    min-width: 1.5em;
    width: 2em;
   }
   html,
   body,
   #container {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
   }
   #container {
    display: flex;
    flex-direction: column;
   }
   #head {
    padding: 5px;
   }
   #input,
   #output {
    padding: 5px;
    box-sizing: border-box;
    width: 100%;
    resize: none;
    font-size: inherit;
    flex-grow: 1;
    margin: 0;
   }
   small {
    display: block;
   }
  </style>
 </head>
 <body>
  <div id="container">
   <div id="head">
    <h1>Initial Teaching Alphabet encoding converter</h1>
    <small>version 1.1.3, last updated <time datetime="2026-06-29">2026 Jun 29th</time></small>
    <label>
     Convert from:
     <select id="originsystem"></select>
    </label>
    <label>
     Convert to:
     <select id="destsystem"></select> </label
    ><br />
    <h2>options</h2>
    <form>
     <ul>
      <li>
       Enclose capitals in non-PitmanITA encoding with: <input type="text" id="startcaps" value="{" />~<input
        type="text"
        id="endcaps"
        value="}" />
      </li>
      <li>
       <label>
        When converting to Phonemics’ encoding, replace “half a”-’s with:
        <select id="bath">
         <option value="trap">two-storey A’s</option>
         <option value="palm">one-storey A’s</option>
        </select>
       </label>
      </li>
     </ul>
    </form>
    <p><a href="table.html">see encoding correspondence table</a></p>
   </div>
   <textarea id="input" placeholder="input some ITA text..." spellcheck="false"></textarea>
   <div id="output"></div>
  </div>
 </body>
</html>
